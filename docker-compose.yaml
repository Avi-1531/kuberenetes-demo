version: "3.0"

services:
  mongodb:
    build:
      context: mongo
    image: avi1531/rs-mongodb:${TAG}

  redis:
    image: redis:6.2-alpine

  rabbitmq:
    image: rabbitmq:3.8-management-alpine

  mysql:
    build:
      context: mysql
    image: avi1531/rs-mysql-db:${TAG}

  catalogue:
    build:
      context: catalogue
    image: avi1531/rs-catalogue:${TAG}
    depends_on:
      - mongodb

  user:
    build:
      context: user
    image: avi1531/rs-user:${TAG}
    depends_on:
      - mongodb
      - redis

  cart:
    build:
      context: cart
    image: avi1531/rs-cart:${TAG}
    depends_on:
      - redis

  shipping:
    build:
      context: shipping
    image: avi1531/rs-shipping:${TAG}
    depends_on:
      - mysql

  ratings:
    build:
      context: ratings
    image: avi1531/rs-ratings:${TAG}
    depends_on:
      - mysql

  payment:
    build:
      context: payment
    image: avi1531/rs-payment:${TAG}
    depends_on:
      - rabbitmq

  dispatch:
    build:
      context: dispatch
    image: avi1531/rs-dispatch:${TAG}
    depends_on:
      - rabbitmq

  web:
    build:
      context: web
      # If you don’t want Instana, you can drop args: / KEY completely
      # args:
      #   KEY: ${INSTANA_AGENT_KEY}
    image: avi1531/rs-web:${TAG}
    depends_on:
      - catalogue
      - user
      - shipping
      - payment
    # ports:
    #   - "8080:8080"   # only needed if you want to run with `docker compose up`


